<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
      <link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="main-logo">
     <a href="#" class="logo">Job <span>Portal</span></a>
     </div>
    <div class="login-page">
        <h1 style="margin-left: 120px;"> Login </h1>
        <p style="text-align: center; color: red;">{{msg}}</p>
        
        <form action="{% url 'loginuser' %}" method="POST">

            {% csrf_token %}
             <div class="candidate-select">
                <label for="">Select Role  <sup style="color: red;">*</sup></label>
                <br>
                <select name="role" id="candidate_select" name="" id="">
                    <option >=======Select Role======</option>
                    <option value="Candidate">Candidate</option>
                    <option value="Campany">Campany</option>
                </select>
            </div>
            <br>
            <div class="email">
                <label for="">
                    Email  <sup style="color: red;">*</sup>
                </label>
                <br>
                
                <input class="input_box" type="text" name="email" placeholder="Email">
            </div>
            <br>
                 <div class="password">
                <label for="">
                    Password  <sup style="color: red;">*</sup>
                </label><br>
                <input class="input_box" type="text" name="password" placeholder="Password">
            </div>
            <br>
            <div class="login-extra">
                <div class="remember">
                    <input type="checkbox" value="">
                    <label for="">Remember me</label>
                </div>
               
                    <a href="">Forgot Password?</a>
            </div>
            <br>
            <button  class="login-btn" style="background-color: #04AA6D;" type="submit" value="Login">Login</button>
            <!-- <div class="other-sigin-options">
                <p>Or Login With</p>
                <div class="social-medias">
                    <a href="" ><i id="fb" class="fa-brands fa-facebook" ></i></a>
                    <a href="" ><i id="g" class="fa-brands fa-google-plus-g"></i></a>
                    <a href="" ><i id="g" class="fa-brands fa-github"></i></a>
                </div>
                </div> -->
                <br><br>
                <a href="{% url 'Signup' %}" style="margin-left: 120px;" >Create an account</a>
            </div>
        </form>
    </div>
</body>

</html>
