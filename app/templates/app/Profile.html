{% extends 'app/block.html' %}



   
   {% block body %}
    <form action="{% url 'updateprofile' pk=request.session.id %}" method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="profile-update">
            <h2>Update your Profile</h2>
            {% if request.session.role == "Candidate" %}
            <div class="box">       
            <div class="label">
                <label for="">Firstname</label>
                <input type="text" class="name-inp" name="fname" value="{{can.firstname}}">
            </div>
            <div class="label">
                <label for="">Lastname</label>
                <input type="text" class="name-inp" name="lname" value="{{can.lastname}}">
            </div>
        </div>
        <br><br>
        <div class="box">
            <div class="label">
                <label for="">Job Type</label>
                <select name="shift" class="select" id="">
                    <option value="">Category</option>
                    <option value="Morning Shift">Morning shift</option>
                    <option value="Evening Shift">Evening Shift</option>
                </select>
            </div>
            <div class="label">
                <label for="">Job Category</label>
                <select name="category" class="select">
                    <option value="">Category</option>
                    <option value="Candidate">Candidate</option>
                    <option value="Company">Company</option>
                </select>
            </div>
            <br><br>
            <div class="box">
                <div class="label">
                    <label for="">City</label>
                    <input type="text" class="name-inp" name="city" value="{{can.city}}">
                </div>
                <div class="label">
                    <label for="">Country</label>
                    <input type="text" class="name-inp" name="country" value="{{can.country}}">
                </div>
            </div>
            <br><br>
            <div class="box">
                <div class="label">
                    <label for="">Contact</label>
                    <input type="number" class="name-inp" name="contact" value="{{can.contact}}">
                </div>
            </div>
            <br><br>
            <div class="box">
                <div class="label">
                    <label for="">Minimum Salary</label>
                    <input type="number" class="name-inp" name="min-sal" value="{{can.min_salary}}">
                </div>
                <div class="label">
                    <label for="">Maximum Salary</label>
                    <input type="number" class="name-inp" name="max-sal" value="{{can.max_salary}}">
                </div>
            </div>
        </div>
        <br><br>
        <div class="box">
            <div class="label">
                <label for="">Highest education</label>
                <input type="text" class="name-inp" name="highestedu" value="{{can.highest_edu}}">
            </div>

            <div class="label">
                <label for="">Experience</label>
                <input type="text" class="name-inp" name="experience" value="{{can.experience}}">
            </div>
        </div>

        <br><br>
        <div class="box">
            <div class="label">
                <label for="">Gender</label>
                <select name="gender" class="select">
                    <option value="">Gender</option>
                    <option value="Male" {% if can.gender == "Male" %}selected{% endif %}>Male</option>
                    <option value="Female" {% if can.gender == "Female" %}selected{% endif %}>Female</option>
                </select>
            </div>

            <div class="label">
                <label for="">Shift</label>
                <select name="shift" class="select">
                    <option value="">Shift</option>
                    <option value="Morning" {% if can.shift == "Morning" %}selected{% endif %}>Morning</option>
                    <option value="Evening" {% if can.shift == "Evening" %}selected{% endif %}>Evening</option>
                </select>
            </div>
        </div>
        <br><br>
        <div class="box">
            <div class="job-description">
                <label for="">Job Description</label>
                <textarea name="job-description">{{can.jobdescription}}</textarea>
            </div>
        </div>
        <br><br>

        <div class="box">
            <div class="file-upload">
                <input type="file" id="fileInput" name="profile_pic" hidden>

                <label for="fileInput" class="file-label" name="profile_pic">
                    <span class="file-text">
                        ☁ Upload Files
                    </span>
                    <span class="browse-btn">Browse</span>
                </label>
            </div>
        </div>

        {% elif request.session.role == "Company" %}
        <div class="box">
            <div class="label">
                <label for="">Firstname</label>
                <input type="text" class="name-inp" name="fname" value="{{company.firstname}}">
            </div>

            <div class="label">
                <label for="">Lastname</label>
                <input type="text" class="name-inp" name="lname" value="{{company.lastname}}">
            </div>
        </div>

        <br><br>
             <div class="box">
            <div class="label">
                <label for="">CompanyName</label>
                <input type="text" class="name-inp" name="companyname" value="{{company.company_name}}">
            </div>
        </div>

        <br><br>

        <div class="box">
            <div class="label">
                <label for="">City</label>
                <input type="text" class="name-inp" name="city" value="{{company.city}}">
            </div>

            <div class="label">
                <label for="">Contact</label>
                <input type="number" class="name-inp" name="contact" value="{{company.contact}}">
            </div>
        </div>

        <br><br>

        <div class="box">
            <div class="label">
                <label for="">Address</label>
                <input type="text" class="name-inp" name="address" value="{{company.address}}">
            </div>
        </div>

        <br><br>

        <div class="box">
            <div class="file-upload">
                <input type="file" id="fileInput" name="logo_pic" hidden>

                <label for="fileInput" class="file-label">
                    <span class="file-text">
                        ☁ Upload Company Logo
                    </span>
                    <span class="browse-btn">Browse</span>
                </label>
            </div>
        </div>
        {% endif %}

        <br>
        <div class="post-btn">
            <button type="submit" id="post">Post a Job</button>
        </div>
    </form>
    </div>


    {% endblock %}
